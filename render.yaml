services:
  - type: web
    name: shreeji-notices
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates this ✅

      - key: DATABASE_URL
        sync: false                # Set manually in Render dashboard ✅

      - key: APP_PASSWORD
        value: shreeji2026         # Society login password

      - key: ADMIN_PASSWORD
        value: Ayan@2020          # Admin panel password — change this!

      - key: NOTICE_API_KEY
        sync: false                # Your Groq API key — set in dashboard