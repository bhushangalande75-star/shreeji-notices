<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Your PIN — Member Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#0ABFA3;--teal2:#08A891;--teal-glow:rgba(10,191,163,0.35);--bg:#C8F0EA;--surface:#FFFFFF;--surface2:#F4FDFB;--border:#C2EDE6;--ink:#063D36;--ink2:#0A4F48;--muted:#7ABFB8;--font:'Plus Jakarta Sans',sans-serif}
    body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(10,191,163,0.2) 0%,transparent 55%),var(--bg)}
    .card{position:relative;z-index:1;width:440px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;box-shadow:0 32px 80px rgba(10,191,163,0.15),inset 0 1px 0 rgba(255,255,255,0.95);animation:fadeUp .5s ease both}
    .icon-wrap{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--teal2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 6px 20px var(--teal-glow)}
    .icon-wrap svg{width:26px;height:26px}
    h2{font-size:22px;font-weight:700;color:var(--ink);text-align:center;letter-spacing:-.4px;margin-bottom:6px}
    .sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6}
    .sub strong{color:var(--ink2)}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
    input{width:100%;padding:12px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--ink2);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s}
    input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,191,163,0.15)}
    .error-msg{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:11px 15px;color:#B91C1C;font-size:13px;margin-bottom:16px}
    .info-box{background:rgba(10,191,163,0.08);border:1px solid rgba(10,191,163,0.25);border-radius:10px;padding:12px 15px;color:var(--ink2);font-size:12px;margin-bottom:20px;line-height:1.6}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:10px;color:white;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;box-shadow:0 4px 16px var(--teal-glow)}
    .btn:hover{transform:translateY(-1px)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  <h2>Set your new PIN</h2>
  <p class="sub">Welcome, <strong>{{ member_name }}</strong>! Please set a personal PIN to secure your account. You will use this every time you log in.</p>
  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
  <div class="info-box">Your PIN must be at least 4 characters and cannot be the same as your flat number.</div>
  <form method="POST">
    <div class="form-group">
      <label>New PIN</label>
      <input type="password" name="new_pin" placeholder="Choose a PIN (min 4 characters)" required autofocus maxlength="20"/>
    </div>
    <div class="form-group">
      <label>Confirm PIN</label>
      <input type="password" name="confirm_pin" placeholder="Re-enter your PIN" required maxlength="20"/>
    </div>
    <button class="btn" type="submit">Set PIN & Continue →</button>
  </form>
</div>
</body>
</html>
