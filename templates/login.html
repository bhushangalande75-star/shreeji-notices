<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shreeji Iconic CHS – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #f4f6f9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(192,0,0,0.10);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    .title { color: #C00000; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #999; font-size: 13px; margin-bottom: 32px; }

    label { display: block; text-align: left; font-size: 13px; color: #555; font-weight: 600; margin-bottom: 6px; }

    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    input[type="password"]:focus { border-color: #C00000; }

    .btn {
      background: #C00000;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #a00000; transform: translateY(-1px); }

    .error {
      background: #fff0f0;
      border: 1px solid #f5c0c0;
      border-radius: 8px;
      padding: 10px 14px;
      color: #C00000;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .note { margin-top: 24px; font-size: 12px; color: #bbb; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🏢</div>
  <div class="title">Shreeji Iconic CHS Ltd.</div>
  <div class="subtitle">Maintenance Notice Generator — Committee Access</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label>🔒 Enter Password</label>
    <input type="password" name="password" placeholder="••••••••••" autofocus required/>
    <button class="btn" type="submit">Login →</button>
  </form>

  <div class="note">Authorised committee members only.<br>Contact the administrator for access.</div>
</div>
</body>
</html>
