<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change PIN — Member Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#0ABFA3;--teal2:#08A891;--teal-glow:rgba(10,191,163,0.35);--bg:#C8F0EA;--surface:#FFFFFF;--surface2:#F4FDFB;--border:#C2EDE6;--ink:#063D36;--ink2:#0A4F48;--muted:#7ABFB8;--font:'Plus Jakarta Sans',sans-serif}
    body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(10,191,163,0.2) 0%,transparent 55%),var(--bg)}
    .card{position:relative;z-index:1;width:440px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;box-shadow:0 32px 80px rgba(10,191,163,0.15);animation:fadeUp .5s ease both}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;margin-bottom:24px;font-weight:500}
    .back-link:hover{color:var(--teal)}
    .icon-wrap{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--teal2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 6px 20px var(--teal-glow)}
    h2{font-size:22px;font-weight:700;color:var(--ink);text-align:center;letter-spacing:-.4px;margin-bottom:6px}
    .sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6}
    .sub strong{color:var(--ink2)}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
    input{width:100%;padding:12px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--ink2);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s}
    input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,191,163,0.15)}
    .error-msg{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:11px 15px;color:#B91C1C;font-size:13px;margin-bottom:16px}
    .success-msg{background:rgba(10,191,163,0.08);border:1px solid rgba(10,191,163,0.3);border-radius:10px;padding:11px 15px;color:var(--ink2);font-size:13px;margin-bottom:16px}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;border-radius:10px;color:white;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;box-shadow:0 4px 16px var(--teal-glow);transition:transform .15s}
    .btn:hover{transform:translateY(-1px)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <a href="/portal/dashboard" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="15,18 9,12 15,6"/></svg>
    Back to Dashboard
  </a>
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  <h2>Change your PIN</h2>
  <p class="sub">Flat <strong>{{ flat }}</strong> · {{ member_name }}</p>
  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
  {% if success %}<div class="success-msg">✓ {{ success }} <a href="/portal/dashboard" style="color:var(--teal);font-weight:600;">Go to dashboard →</a></div>{% endif %}
  {% if not success %}
  <form method="POST">
    <div class="form-group">
      <label>Current PIN</label>
      <input type="password" name="current_pin" placeholder="Enter your current PIN" required autofocus maxlength="20"/>
    </div>
    <div class="form-group">
      <label>New PIN</label>
      <input type="password" name="new_pin" placeholder="Choose a new PIN (min 4 characters)" required maxlength="20"/>
    </div>
    <div class="form-group">
      <label>Confirm New PIN</label>
      <input type="password" name="confirm_pin" placeholder="Re-enter new PIN" required maxlength="20"/>
    </div>
    <button class="btn" type="submit">Change PIN →</button>
  </form>
  {% endif %}
</div>
</body>
</html>
